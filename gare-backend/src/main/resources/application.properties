# ===== APPLICATION =====
spring.application.name=gare-backend
server.port=8080

# ===== DATABASE (Docker sur port 3307) =====
spring.datasource.url=jdbc:mysql://localhost:3307/gare_routiere?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===== JWT =====
jwt.secret=gare_routiere_secret_key_emsi_2025_hatim_koubri_very_long_key_minimum_32_chars
jwt.expiration=86400000

# ===== MAIL =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ton_email@gmail.com
spring.mail.password=ton_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== SWAGGER =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info