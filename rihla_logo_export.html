<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo RIHLA - Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* Fond blanc pour le rapport */
            margin: 0;
        }
        .logo-text {
            font-size: 8rem; /* Grande taille pour une bonne résolution */
            font-weight: 900;
            letter-spacing: -0.05em;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(to bottom right, #f97316, #ea580c, #dc2626); /* from-orange-500 via-orange-600 to-red-600 */
            filter: drop-shadow(0 4px 8px rgba(249, 115, 22, 0.3));
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="logo-text">RIHLA</div>
</body>
</html>
